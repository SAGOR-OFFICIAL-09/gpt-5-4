<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Shin Iryuu</title>
<style>
  /* --- Your original styles preserved --- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --header-bg: #13161e;
    --card: #181c26;
    --border: #1e2333;
    --input-bg: #1a1f2e;
    --text: #dde3f0;
    --muted: #5a637a;
    --user-bubble: #1a5aff;
    --user-bubble-text: #ffffff;
    --ai-bubble: #1a1f2e;
    --ai-bubble-text: #dde3f0;
    --primary: #1a5aff;
    --green: #22c55e;
    --font: system-ui, -apple-system, sans-serif;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
  }

  #header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1e2333, #13161e);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    max-width: 75%;
    word-break: break-word;
  }

  .bubble.user {
    background: var(--user-bubble);
    color: white;
    align-self: flex-end;
  }

  .bubble.ai {
    background: var(--ai-bubble);
    color: var(--text);
    border: 1px solid var(--border);
    align-self: flex-start;
  }

  .image-bubble img {
    max-width: 200px;
    border-radius: 12px;
  }

  #footer {
    padding: 10px;
    display: flex;
    gap: 8px;
    background: var(--header-bg);
    border-top: 1px solid var(--border);
  }

  #input {
    flex: 1;
    padding: 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
  }

  .upload-btn, #send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }

  .upload-btn {
    background: var(--card);
    color: white;
    font-size: 18px;
  }

  #send-btn {
    background: var(--primary);
    color: white;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="avatar">🌸</div>
    <div>
      <div>Shin Iryuu</div>
      <small style="color:#22c55e;">Online</small>
    </div>
  </div>

  <div id="messages"></div>

  <div id="footer">
    <input id="input" type="text" placeholder="Message Shin Iryuu" />
    <label for="imageInput" class="upload-btn">📷</label>
    <input type="file" id="imageInput" accept="image/*" hidden />
    <button id="send-btn">➤</button>
  </div>
</div>

<script>
  const API = '/api';
  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const imageInput = document.getElementById('imageInput');

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'bubble ' + role;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function addImage(role, src) {
    const div = document.createElement('div');
    div.className = 'bubble ' + role + ' image-bubble';
    const img = document.createElement('img');
    img.src = src;
    div.appendChild(img);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    input.value = '';

    try {
      const res = await fetch(`${API}?p=${encodeURIComponent(text)}`);
      const data = await res.json();
      addMessage('ai', data.message || 'No response');
    } catch {
      addMessage('ai', '⚠️ Failed to connect to the server.');
    }
  }

  sendBtn.onclick = sendMessage;
  input.addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMessage();
  });

  imageInput.addEventListener('change', () => {
    const file = imageInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result;
      addImage('user', base64);

      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64 })
      });

      const data = await res.json();
      if (data.status === 'success') {
        addImage('ai', data.imageUrl);
      }
    };
    reader.readAsDataURL(file);
  });
</script>
</body>
</html>
